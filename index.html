<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <title>Gửi em bé đi thi ❤️</title>
  </head>
  <body>
    <main class="container">
      <div class="card">
        <h1 class="main-title">Chúc em bé của anh thi thật tốt! 🎯✨</h1>
        <p class="subtitle">
          Hôm nay là ngày thi kết thúc môn rồi. Anh Kiệt ở đây tiếp thêm 1000% công lực cho em nè! Chọn các thẻ tiếp sức bên dưới nha:
        </p>

        <!-- Danh sách các ô tiếp năng lượng -->
        <div class="topic-grid">
          <button class="topic-btn" data-topic="luck">Nhận 100% may mắn 🍀</button>
          <button class="topic-btn" data-topic="calm">Bình tĩnh & Tự tin 🧠</button>
          <button class="topic-btn" data-topic="easy">Đề đúng tủ 📖</button>
          <button class="topic-btn" data-topic="reward">Phần thưởng sau thi 🧋</button>
          <button class="topic-btn" data-topic="hug">Năng lượng yêu thương 💖</button>
        </div>

        <!-- Khung hiển thị lời nhắn -->
        <div id="message-box" class="message-box hidden">
          <p id="message-text"></p>
          <button id="close-btn" class="close-btn">Đã nhận năng lượng! 🚀</button>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
