<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Protest+Riot&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <title>Gửi bé iu của anhhh</title>
  </head>
  <body>
    <main class="container">
      <img class="cat-img" src="cat-2.gif.png" alt="Picture of a cat" />
      
      <p class="title">
        Chào bé iu, hoom nay là buổi hẹn hò đầu tiên của tụi mình nèee 🥰
      </p>
      
      <div class="buttons">
        <button type="button" class="btn btn--next">Tiếp tục ➔</button>
        <button type="button" class="btn btn--yes hidden">Cảm ơn bé đã đòng ý đi chơi với anh ❤️</button>
      </div>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
