<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <title>Gửi em...</title>
  </head>
  <body>
    <main class="container">
      <div class="card">
        <h1 class="main-title">hôm nay sao nà chị yêu :>></h1>
        <p class="subtitle">
          không còn đi cùng nữa nhưng mong chị vẫn sẽ cố gắng chị bé của em giỏi lắm á 
        </p>

        <!-- Danh sách các ô lựa chọn -->
        <div class="topic-grid">
          <button class="topic-btn" data-topic="daily">Nhắc nhở hằng ngày 🌿</button>
          <button class="topic-btn" data-topic="sad">Hôm nay buồn 🌧️</button>
          <button class="topic-btn" data-topic="study">Học áp lực 📚</button>
          <button class="topic-btn" data-topic="family">Gia đình áp lực 🏠</button>
          <button class="topic-btn" data-topic="hurt">Bị người yêu làm đau 💔</button>
          <button class="topic-btn" data-topic="miss">Nhớ Kiệt 🌙</button>
        </div>

        <!-- Khung hiển thị lời nhắn an ủi -->
        <div id="message-box" class="message-box hidden">
          <p id="message-text"></p>
          <button id="close-btn" class="close-btn">Đóng lời nhắn</button>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
