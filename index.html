<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Protest+Riot&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <title>Gửi bé iu của anhhh</title>
  </head>
  <body>
    <main class="container">
      <!-- Bạn có thể đổi ảnh cat-2 thành ảnh chú mèo đang hối lỗi -->
      <img class="cat-img" src="cat-2.gif.png" alt="Picture of a cat" />
      
      <p class="title">
        Anh xin lỗi mà, đừng giận anh nữa bé iu nhéee? 🥺❤️
      </p>
      
      <div class="buttons">
        <button type="button" class="btn btn--yes">Đồng ý tha lỗi 🥰</button>
        <button type="button" class="btn btn--no">Không bao giờ 😡</button>
      </div>
    </main>
    <audio id="bg-music" src="anh-nang-cua-anh.mp3" loop></audio>
    <script type="module" src="script.js"></script>
  </body>
</html>
